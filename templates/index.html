<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Chat Interface</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
        integrity="sha512-9usAa10IRO0HhonpyAIVpjrylPvoDwiPUiKdWk5t3PyolY1cOd4DSE0Ga+ri4AuTroPR5aQvXU9xC6qOPnzFeg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>

    <div class="app-container">

        <!-- Sidebar / Navigation (for future expansion) -->
        <nav class="sidebar">
            <div class="logo">
                <i class="fa-solid fa-sparkles"></i> <span>Gemini Chat</span>
            </div>

            <div class="nav-links">
                <a href="#" class="active"><i class="fa-regular fa-comment-dots"></i> New Chat</a>
                <a href="#" onclick="clearHistory()"><i class="fa-solid fa-trash-can"></i> Clear History</a>
                <!-- Settings, etc could go here -->
            </div>

            <div class="user-profile">
                <div class="user-avatar">U</div>
                <div class="user-info">
                    <span class="user-name">User</span>
                    <span class="user-status">Online</span>
                </div>
            </div>
        </nav>

        <!-- Main Chat Area -->
        <main class="chat-interface">
            <header class="chat-header">
                <h2>Assistant</h2>
                <div class="status-indicator">
                    <span class="dot"></span> Active
                </div>
            </header>

            <div class="chat-messages" id="chat-messages">
                <!-- Messages will appear here -->
                <div class="message system-message">
                    Hello! I am your AI assistant powered by Gemini. How can I help you today?
                </div>
            </div>

            <div class="input-area">
                <div class="input-wrapper">
                    <textarea id="user-input" placeholder="Type your message..." rows="1"></textarea>
                    <button id="mic-btn" onclick="toggleRecording()">
                        <i class="fa-solid fa-microphone"></i>
                    </button>
                    <button id="send-btn" onclick="sendMessage()">
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </main>

    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>

</html>
